<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulfra TV - Pair Your Remote</title>
    <link rel="stylesheet" href="qr-system.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="tv-display">
        <div class="tv-screen" id="tv-screen">
            <!-- Initial Pairing Screen -->
            <div class="pairing-screen" id="pairing-screen">
                <div class="tv-header">
                    <h1>📺 Soulfra TV</h1>
                    <p>Professional Developer Portfolio System</p>
                </div>
                
                <div class="qr-container">
                    <div class="qr-frame">
                        <canvas id="qr-code"></canvas>
                    </div>
                    <div class="pairing-instructions">
                        <h2>Scan to Connect Remote</h2>
                        <p>Use your phone camera to scan the QR code</p>
                        <p class="session-id">Session: <span id="session-id">...</span></p>
                    </div>
                </div>
                
                <div class="connection-status">
                    <div class="status-indicator" id="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">Waiting for remote...</span>
                    </div>
                </div>
            </div>
            
            <!-- Connected Content Display -->
            <div class="content-display" id="content-display" style="display: none;">
                <div class="content-header">
                    <div class="channel-info">
                        <span class="channel-number" id="current-channel">1</span>
                        <span class="channel-name" id="current-name">Welcome</span>
                    </div>
                    <div class="connection-info">
                        <span class="connected-device" id="connected-device">📱 Remote Connected</span>
                    </div>
                </div>
                
                <div class="content-area" id="content-area">
                    <!-- Dynamic content controlled by mobile remote -->
                </div>
                
                <!-- AI Agent Status -->
                <div class="agent-status" id="agent-status">
                    <div class="agent-indicator">
                        <span class="agent-icon">🤖</span>
                        <span class="agent-text">AI Agent: <span id="agent-state">Inactive</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="tv-display.js"></script>
</body>
</html>
